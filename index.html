<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Burhaniye Tattoo | Profesyonel Dövme Stüdyosu</title>

<meta name="description" content="Burhaniye Tattoo - Profesyonel, hijyenik ve kaliteli dövme hizmeti.">
<meta name="theme-color" content="#001a00">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
color:white;
text-align:center;
overflow-x:hidden;
background:black;
}

/* 🔥 PREMIUM ANIMATED BACKGROUND */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:url('bg.jpg') no-repeat center center;
background-size:cover;

animation:bgMove 12s ease-in-out infinite alternate;
z-index:-2;
}

/* DARK OVERLAY */
body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,25,0,0.85);
z-index:-1;
}

/* BACKGROUND ANIMATION */
@keyframes bgMove{
0%{transform:scale(1) translateY(0);}
100%{transform:scale(1.1) translateY(-20px);}
}

/* SCROLL ANIMATION */
.fade{
opacity:0;
transform:translateY(30px);
transition:1s;
}
.fade.show{
opacity:1;
transform:translateY(0);
}

/* HEADER */
header{padding:60px 20px;}

.logo-img{
width:180px;
filter: drop-shadow(0 0 10px #00ff88)
        drop-shadow(0 0 30px #ffffff);
animation:pulse 2s infinite alternate;
}

@keyframes pulse{
from{transform:scale(1);}
to{transform:scale(1.05);}
}

/* BUTTON */
.btn{
display:inline-block;
margin:10px;
padding:14px 22px;
border-radius:30px;
background:#00cc66;
color:white;
text-decoration:none;
box-shadow:0 0 10px #00ff88;
transition:.3s;
}

.btn:hover{
box-shadow:0 0 25px #00ff88,0 0 40px #ffffff;
transform:scale(1.05);
}

/* SECTION */
.section{
padding:25px;
margin:15px;
border-radius:20px;
background:rgba(0,20,0,0.5);
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(0,255,120,0.2);
}

/* SELECT */
select{
padding:12px;
border-radius:10px;
background:#001a00;
color:white;
border:1px solid #00ff88;
margin:5px;
}

/* RESULT */
#result{
margin-top:20px;
font-size:22px;
color:#00ff88;
text-shadow:0 0 15px #00ff88;
}

/* GALERİ */
.gallery{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

.gallery img{
width:30%;
border-radius:15px;
cursor:pointer;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ff88;
}

/* FULLSCREEN */
.fullscreen{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.fullscreen img{
width:90%;
}

/* TRUST */
.trust{
font-size:14px;
line-height:1.6;
color:#ccc;
}

/* MOBILE */
@media(max-width:768px){
.gallery img{width:100%;}
.logo-img{width:140px;}
.btn{padding:12px 18px;}
}

/* FOOTER */
footer{
padding:20px;
color:#aaa;
font-size:12px;
}
</style>
</head>

<body>

<header class="fade">
<img src="logo.png" class="logo-img">
<p>Profesyonel & Hijyenik Dövme</p>

<a href="https://wa.me/905xxxxxxxxx" class="btn">WhatsApp Randevu</a>
<a href="https://www.instagram.com/burhaniye_tattoo/" class="btn">Instagram</a>
</header>

<section class="section fade">
<h2>Fiyat Hesapla</h2>

<select id="size">
<option value="">Boyut</option>
<option value="minimal">Minimal</option>
<option value="kucuk">Küçük</option>
<option value="orta">Orta</option>
<option value="buyuk">Büyük</option>
</select>

<select id="style">
<option value="">Stil</option>
<option value="yazi">Yazı</option>
<option value="normal">Normal</option>
<option value="detayli">Detaylı</option>
<option value="golgeli">Gölgeli</option>
</select>

<select id="color">
<option value="">Renk</option>
<option value="black">Siyah</option>
<option value="color">Renkli (%30 İndirim)</option>
</select>

<br><br>

<button onclick="calcPrice()" class="btn">Fiyat Hesapla</button>

<h3 id="result"></h3>
</section>

<section class="section fade">
<h2>Örnek Dövmeler</h2>
<div class="gallery">
<img src="1.jpg" onclick="openFull(this.src)">
<img src="2.jpg" onclick="openFull(this.src)">
<img src="3.jpg" onclick="openFull(this.src)">
<img src="4.jpg" onclick="openFull(this.src)">
<img src="5.jpg" onclick="openFull(this.src)">
<img src="6.jpg" onclick="openFull(this.src)">
</div>
</section>

<section class="section fade">
<h2>Hijyen & Güven</h2>
<p class="trust">
✔ Tek kullanımlık iğneler<br>
✔ Steril ekipman<br>
✔ Profesyonel çalışma ortamı<br>
✔ Deneyimli sanatçı<br>
✔ %100 müşteri memnuniyeti
</p>
</section>

<div class="fullscreen" id="full" onclick="closeFull()">
<img id="fullImg">
</div>

<footer>
© 2026 Burhaniye Tattoo
</footer>

<script>

// SCROLL ANIMATION
const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show");
}
});
});
document.querySelectorAll(".fade").forEach(el=>observer.observe(el));

// FULLSCREEN
function openFull(src){
document.getElementById("full").style.display="flex";
document.getElementById("fullImg").src=src;
}
function closeFull(){
document.getElementById("full").style.display="none";
}

// PRICE SYSTEM
function calcPrice(){
let size=document.getElementById("size").value;
let style=document.getElementById("style").value;
let color=document.getElementById("color").value;

let min=0,max=0;

if(size==="minimal"){min=900;max=1200;}
if(size==="kucuk"){min=2000;max=3000;}
if(size==="orta"){min=3000;max=6000;}
if(size==="buyuk"){min=8000;max=15000;}

if(style==="detayli"){min*=1.3;max*=1.4;}
if(style==="golgeli"){min*=1.4;max*=1.5;}

// 🔥 %30 İNDİRİM
if(color==="color"){
min*=0.7;
max*=0.7;
}

min=Math.round(min);
max=Math.round(max);

document.getElementById("result").innerHTML=
"Yaklaşık Fiyat: "+min+" - "+max+" ₺";
}

</script>

</body>
</html>
