<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burhaniye Tattoo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#0a0a0a;color:white;}

header{text-align:center;padding:60px 20px;}
header h1{font-size:35px;}

.prices{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.bubble{
width:220px;
padding:25px;
border-radius:30px;
background:#1a1a1a;
cursor:pointer;
transition:.3s;
text-align:center;
}

.bubble:hover{transform:scale(1.1);background:#2a2a2a;}

.popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.95);
display:none;
flex-direction:column;
align-items:center;
overflow:auto;
z-index:999;
}

.popup img{
width:90%;
max-width:400px;
margin:10px;
border-radius:15px;
}

.close{
position:fixed;
top:20px;
right:25px;
font-size:30px;
cursor:pointer;
}

.btn{
display:inline-block;
margin:30px;
padding:15px 30px;
border-radius:30px;
background:#e1306c;
color:white;
text-decoration:none;
}
</style>
</head>

<body>

<header>
<h1>Burhaniye Tattoo</h1>
</header>

<section class="prices">

<div class="bubble" onclick="openGallery('minimal')">Minimal Dövme<br><b>1000 ₺</b></div>
<div class="bubble" onclick="openGallery('half')">Yarım Kol Ön Yüz<br><b>8000 ₺</b></div>
<div class="bubble" onclick="openGallery('fullhalf')">Yarım Kol Komple<br><b>15000 ₺</b></div>
<div class="bubble" onclick="openGallery('full')">Tam Kol<br><b>30000 ₺</b></div>
<div class="bubble" onclick="openGallery('shoulder')">Yarım Omuz<br><b>15000 ₺</b></div>
<div class="bubble" onclick="openGallery('remove')">Dövme Silme<br><b>1500-3000 ₺</b></div>

</section>

<div style="text-align:center;">
<a href="https://www.instagram.com/burhaniye_tattoo/" target="_blank" class="btn">
Instagram’dan İletişim
</a>
</div>

<div class="popup" id="popup">
<span class="close" onclick="closeGallery()">✖</span>
<div id="gallery"></div>
</div>

<script>
const images = {
minimal:[
"https://picsum.photos/400?random=1",
"https://picsum.photos/400?random=2",
"https://picsum.photos/400?random=3"
],
half:[
"https://picsum.photos/400?random=4",
"https://picsum.photos/400?random=5",
"https://picsum.photos/400?random=6"
],
fullhalf:[
"https://picsum.photos/400?random=7",
"https://picsum.photos/400?random=8",
"https://picsum.photos/400?random=9"
],
full:[
"https://picsum.photos/400?random=10",
"https://picsum.photos/400?random=11",
"https://picsum.photos/400?random=12"
],
shoulder:[
"https://picsum.photos/400?random=13",
"https://picsum.photos/400?random=14",
"https://picsum.photos/400?random=15"
],
remove:[
"https://picsum.photos/400?random=16",
"https://picsum.photos/400?random=17",
"https://picsum.photos/400?random=18"
]
};

function openGallery(type){
let popup=document.getElementById("popup");
let gallery=document.getElementById("gallery");

gallery.innerHTML="";

images[type].forEach(src=>{
let img=document.createElement("img");
img.src=src;
gallery.appendChild(img);
});

popup.style.display="flex";
}

function closeGallery(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
