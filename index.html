<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burhaniye Tattoo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{background:#0a0a0a;color:white;text-align:center;}

/* HEADER */
header{padding:60px 20px;}
header h1{font-size:34px;}

/* PRICE */
.prices{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.bubble{
width:220px;
padding:25px;
border-radius:30px;
background:#1a1a1a;
cursor:pointer;
transition:.3s;
}

.bubble:hover{
transform:scale(1.1);
background:#2a2a2a;
}

/* GALLERY */
.gallery{
display:none;
flex-wrap:wrap;
justify-content:center;
gap:15px;
padding:20px;
}

.gallery a{
width:45%;
max-width:250px;
}

.gallery img{
width:100%;
border-radius:15px;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* BUTTON */
.btn{
display:inline-block;
margin:30px;
padding:15px 30px;
border-radius:30px;
background:#e1306c;
color:white;
text-decoration:none;
}

.back{
margin:20px;
cursor:pointer;
color:#aaa;
font-size:18px;
}
</style>
</head>

<body>

<header>
<h1>Burhaniye Tattoo</h1>
</header>

<!-- FİYATLAR -->
<section class="prices" id="prices">

<div class="bubble" onclick="openCat('minimal')">Minimal Dövme<br><b>1000 ₺</b></div>

<div class="bubble" onclick="openCat('kol')">Yarım Kol Ön Yüz<br><b>8000 ₺</b></div>

<div class="bubble" onclick="openCat('kol')">Yarım Kol Komple<br><b>15000 ₺</b></div>

<div class="bubble" onclick="openCat('full')">Tam Kol<br><b>30000 ₺</b></div>

<div class="bubble" onclick="openCat('omuz')">Yarım Omuz<br><b>15000 ₺</b></div>

<div class="bubble" onclick="openCat('remove')">Dövme Silme<br><b>1500-3000 ₺</b></div>

</section>

<div class="back" onclick="goBack()" id="backBtn" style="display:none;">
← Geri
</div>

<!-- GALERİ -->
<div class="gallery" id="gallery"></div>

<div>
<a href="https://www.instagram.com/burhaniye_tattoo/" target="_blank" class="btn">
Instagram’dan İletişim
</a>
</div>

<script>
const data = {

minimal:[
"https://www.instagram.com/p/DXEBKtQjKDk/",
"https://www.instagram.com/p/DXEBJHGjObw/"
],

kol:[
"https://www.instagram.com/p/DXEA7adjBSe/",
"https://www.instagram.com/p/DXEA4nqDBnL/",
"https://www.instagram.com/p/DXEA1-fDJAx/",
"https://www.instagram.com/p/DXEA0KiDKKS/"
],

full:[
"https://www.instagram.com/p/DXEAysfjMzV/",
"https://www.instagram.com/p/DXEAw6QjBQW/"
],

omuz:[
"https://www.instagram.com/p/DXEAudajNRT/"
],

remove:[
"https://www.instagram.com/p/DXEAsgDDGaF/"
]

};

function openCat(cat){
document.getElementById("prices").style.display="none";
document.getElementById("gallery").style.display="flex";
document.getElementById("backBtn").style.display="block";

let gallery=document.getElementById("gallery");
gallery.innerHTML="";

data[cat].forEach(link=>{
let a=document.createElement("a");
a.href=link;
a.target="_blank";

let img=document.createElement("img");
img.src="https://picsum.photos/300?random="+Math.random();

a.appendChild(img);
gallery.appendChild(a);
});
}

function goBack(){
document.getElementById("prices").style.display="flex";
document.getElementById("gallery").style.display="none";
document.getElementById("backBtn").style.display="none";
}
</script>

</body>
</html>
