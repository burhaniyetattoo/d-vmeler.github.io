<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Burhaniye Tattoo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

html,body{
height:100%;
overflow-x:hidden;
}

/* 🔥 SPLASH SCREEN */
#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
transition:opacity 0.6s ease, visibility 0.6s;
}

#splash.hide{
opacity:0;
visibility:hidden;
}

.splash-logo{
width:140px;
animation:logoZoom 1.5s ease-in-out infinite alternate;
filter: drop-shadow(0 0 15px #00ff88);
}

@keyframes logoZoom{
0%{transform:scale(1);}
100%{transform:scale(1.1);}
}

.loader-text{
margin-top:15px;
color:#00ff88;
font-size:14px;
opacity:0.8;
animation:fadeText 1.5s infinite;
}

@keyframes fadeText{
0%{opacity:0.3;}
50%{opacity:1;}
100%{opacity:0.3;}
}

/* 🔥 ARKA PLAN */
body{
color:white;
text-align:center;
background:url('bg.jpg') center center no-repeat;
background-size:cover;
background-attachment:scroll;
}

/* OVERLAY */
body::before{
content:"";
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,25,0,0.85);
z-index:-1;
}

/* İLETİŞİM */
.contact-btn{
position:fixed;
top:20px;
right:20px;
z-index:999;
padding:10px 18px;
border-radius:30px;
background:rgba(0,255,136,0.15);
border:1px solid #00ff88;
color:#00ff88;
text-decoration:none;
backdrop-filter:blur(10px);
}

/* SECTION */
.section{
padding:25px;
margin:15px;
border-radius:25px;
background:rgba(0,20,0,0.5);
backdrop-filter:blur(15px);
}

/* HEADER */
header{padding:50px 20px;}

.logo-img{
width:160px;
filter: drop-shadow(0 0 10px #00ff88);
}

/* BUTTON */
.btn{
padding:14px 22px;
border-radius:30px;
background:#00cc66;
color:white;
box-shadow:0 0 10px #00ff88;
border:none;
cursor:pointer;
}

/* SELECT */
select{
padding:12px;
border-radius:10px;
background:#001a00;
color:white;
border:1px solid #00ff88;
margin:5px;
}

/* RESULT */
#result{
margin-top:20px;
font-size:22px;
color:#00ff88;
}

/* WARNING */
.warning{
color:#ff4d4d;
display:none;
}

/* LOADING */
.loading-box{display:none;margin-top:20px;}
.needle{
font-size:30px;
animation:needleMove 0.6s infinite alternate;
}
@keyframes needleMove{
from{transform:translateY(0);}
to{transform:translateY(8px);}
}

/* GALERİ */
.gallery{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}
.gallery img{
width:30%;
border-radius:15px;
cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
.gallery img{width:100%;}
.logo-img{width:130px;}
.contact-btn{top:10px;right:10px;font-size:12px;}
}

footer{
padding:15px;
color:#aaa;
font-size:12px;
}
</style>
</head>

<body>

<!-- 🔥 SPLASH -->
<div id="splash">
<img src="logo.png" class="splash-logo">
<div class="loader-text">Yükleniyor...</div>
</div>

<a href="https://www.instagram.com/burhaniye_tattoo/" target="_blank" class="contact-btn">
📩 İletişim
</a>

<header>
<img src="logo.png" class="logo-img">
<p>Profesyonel & Hijyenik Dövme</p>
</header>

<section class="section">
<h2>Fiyat Hesapla</h2>

<select id="size">
<option value="">Boyut</option>
<option value="minimal">Minimal</option>
<option value="kucuk">Küçük</option>
<option value="orta">Orta</option>
<option value="buyuk">Büyük</option>
</select>

<select id="style">
<option value="">Stil</option>
<option value="yazi">Yazı</option>
<option value="normal">Normal</option>
<option value="detayli">Detaylı</option>
<option value="golgeli">Gölgeli</option>
</select>

<br><br>

<button onclick="calcPrice()" class="btn" id="calcBtn">Fiyat Hesapla</button>

<p class="warning" id="warn">Lütfen tüm seçimleri yapın!</p>

<div id="loadingBox" class="loading-box">
<div class="needle">💉</div>
<div>Fiyat hesaplanıyor...</div>
</div>

<h3 id="result"></h3>

<p id="note" class="note">
Bu fiyatlar dövme modeline göre değişebilir. En doğru fiyat için bize ulaşın.
</p>

</section>

<section class="section">
<h2>Örnek Dövmeler</h2>

<div class="gallery">
<img src="1.jpg"><img src="2.jpg"><img src="3.jpg">
<img src="4.jpg"><img src="5.jpg"><img src="6.jpg">
<img src="7.jpg"><img src="8.jpg"><img src="9.jpg">
<img src="10.jpg"><img src="11.jpg"><img src="12.jpg">
</div>

</section>

<footer>
© 2026 Burhaniye Tattoo
</footer>

<script>

/* 🔥 SPLASH HIDE */
window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("splash").classList.add("hide");
},1200);
});

/* PRICE */
function calcPrice(){
let size=document.getElementById("size").value;
let style=document.getElementById("style").value;

if(!size || !style){
document.getElementById("warn").style.display="block";
return;
}

document.getElementById("loadingBox").style.display="block";

setTimeout(()=>{
document.getElementById("loadingBox").style.display="none";
document.getElementById("result").innerHTML="Fiyat hesaplandı";
},1200);
}

</script>

</body>
</html>
