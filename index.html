<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Burhaniye Tattoo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

html,body{
height:100%;
overflow-x:hidden;
}

/* 🔥 SPLASH */
#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
transition:0.6s;
}
#splash.hide{
opacity:0;
visibility:hidden;
}

.splash-logo{
width:140px;
animation:zoom 1.5s infinite alternate;
}
@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

/* 🔥 ARKA PLAN SABİT */
body{
color:white;
text-align:center;
background:url('bg.jpg') center center no-repeat;
background-size:cover;
background-attachment:scroll;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(0,25,0,0.85);
z-index:-1;
}

/* İLETİŞİM */
.contact-btn{
position:fixed;
top:20px;
right:20px;
z-index:999;
padding:10px 18px;
border-radius:30px;
background:rgba(0,255,136,0.15);
border:1px solid #00ff88;
color:#00ff88;
text-decoration:none;
}

/* HEADER */
header{padding:50px 20px;}

.logo-img{
width:150px;
}

/* SECTION */
.section{
padding:25px;
margin:15px;
border-radius:20px;
background:rgba(0,20,0,0.5);
}

/* SELECT */
select{
padding:10px;
border-radius:10px;
background:#001a00;
color:white;
border:1px solid #00ff88;
margin:5px;
}

/* BUTTON */
.btn{
padding:14px 22px;
border-radius:30px;
background:#00cc66;
color:white;
border:none;
cursor:pointer;
}

/* WARNING */
.warning{
color:red;
display:none;
}

/* RESULT */
#result{
margin-top:20px;
font-size:20px;
color:#00ff88;
}

/* LOADING */
.loading-box{display:none;}
.needle{
font-size:30px;
animation:move 0.6s infinite alternate;
}
@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(8px);}
}

/* GALERİ */
.gallery{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}
.gallery img{
width:30%;
border-radius:10px;
cursor:pointer;
}

/* FULLSCREEN */
.fullscreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:999;
}
.fullscreen img{width:90%;}

/* MOBILE */
@media(max-width:768px){
.gallery img{width:100%;}
}

footer{
padding:20px;
color:#aaa;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
<img src="logo.png" class="splash-logo">
<p>Yükleniyor...</p>
</div>

<a href="https://www.instagram.com/burhaniye_tattoo/" target="_blank" class="contact-btn">
📩 İletişim
</a>

<header>
<img src="logo.png" class="logo-img">
<p>Profesyonel & Hijyenik Dövme</p>
</header>

<section class="section">
<h2>Fiyat Hesapla</h2>

<select id="size">
<option value="">Boyut</option>
<option value="minimal">Minimal</option>
<option value="kucuk">Küçük</option>
<option value="orta">Orta</option>
<option value="buyuk">Büyük</option>
</select>

<select id="style">
<option value="">Stil</option>
<option value="yazi">Yazı</option>
<option value="normal">Normal</option>
<option value="detayli">Detaylı</option>
<option value="golgeli">Gölgeli</option>
</select>

<br><br>

<button onclick="calcPrice()" class="btn" id="calcBtn">Fiyat Hesapla</button>

<p class="warning" id="warn">Seçim yap!</p>

<div class="loading-box" id="loadingBox">
<div class="needle">💉</div>
<p>Hesaplanıyor...</p>
</div>

<h3 id="result"></h3>

<p id="note" style="font-size:12px;color:#ccc;opacity:0;">
Fiyatlar modele göre değişebilir.
</p>

</section>

<section class="section">
<h2>Örnek Dövmeler</h2>

<div class="gallery">
<img src="1.jpg" onclick="openFull(this.src)">
<img src="2.jpg" onclick="openFull(this.src)">
<img src="3.jpg" onclick="openFull(this.src)">
<img src="4.jpg" onclick="openFull(this.src)">
<img src="5.jpg" onclick="openFull(this.src)">
<img src="6.jpg" onclick="openFull(this.src)">
<img src="7.jpg" onclick="openFull(this.src)">
<img src="8.jpg" onclick="openFull(this.src)">
<img src="9.jpg" onclick="openFull(this.src)">
<img src="10.jpg" onclick="openFull(this.src)">
<img src="11.jpg" onclick="openFull(this.src)">
<img src="12.jpg" onclick="openFull(this.src)">
</div>

</section>

<div class="fullscreen" id="full" onclick="closeFull()">
<img id="fullImg">
</div>

<footer>
© 2026 Burhaniye Tattoo
</footer>

<script>

/* SPLASH */
window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("splash").classList.add("hide");
},1200);
});

/* GALERİ */
function openFull(src){
document.getElementById("full").style.display="flex";
document.getElementById("fullImg").src=src;
}
function closeFull(){
document.getElementById("full").style.display="none";
}

/* FİYAT */
function calcPrice(){

let size=document.getElementById("size").value;
let style=document.getElementById("style").value;

if(!size || !style){
document.getElementById("warn").style.display="block";
return;
}

document.getElementById("warn").style.display="none";
document.getElementById("loadingBox").style.display="block";

setTimeout(()=>{

let min=0,max=0;

if(size==="minimal"){min=900;max=1000;}

if(size==="kucuk"){
if(style==="detayli"||style==="golgeli"){min=2500;max=3000;}
else{min=2000;max=3000;}
}

if(size==="orta"){
if(style==="yazi"){min=2000;max=4000;}
else if(style==="normal"){min=3000;max=4000;}
else{min=3500;max=5000;}
}

if(size==="buyuk"){
if(style==="yazi"){min=7000;max=9000;}
else if(style==="normal"){min=8000;max=11000;}
else if(style==="detayli"){min=9000;max=15000;}
else if(style==="golgeli"){min=9000;max=12000;}
}

document.getElementById("loadingBox").style.display="none";

document.getElementById("result").innerHTML=
"Yaklaşık Fiyat: "+min+" - "+max+" ₺";

document.getElementById("note").style.opacity="1";

},1200);

}

</script>

</body>
</html>
