<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Burhaniye Tattoo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<meta name="theme-color" content="#0a0a0a">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
color:white;
text-align:center;
background:url('https://images.unsplash.com/photo-1542728928-1413d1894ed1') no-repeat center center fixed;
background-size:cover;
}

body::before{
content:"";
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
z-index:-1;
}

header{padding:60px 20px;}

.logo-img{
width:180px;
filter: drop-shadow(0 0 10px #e1306c);
}

.btn{
display:inline-block;
margin:10px;
padding:14px 22px;
border-radius:30px;
background:#e1306c;
color:white;
text-decoration:none;
}

.section{
padding:25px;
background:rgba(0,0,0,0.6);
margin:15px;
border-radius:20px;
}

select{
padding:12px;
border-radius:10px;
background:#111;
color:white;
border:1px solid #e1306c;
margin:5px;
}

#result{
margin-top:20px;
font-size:20px;
color:#ff4da6;
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

.gallery img{
width:45%;
border-radius:15px;
cursor:pointer;
}

.fullscreen{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
}

.fullscreen img{
width:90%;
}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo-img">
<p>Profesyonel & Hijyenik Dövme</p>
<a href="https://www.instagram.com/burhaniye_tattoo/" class="btn">Rezervasyon</a>
</header>

<section class="section">
<h2>Fiyat Hesapla</h2>

<select id="size">
<option value="">Boyut Seç</option>
<option value="minimal">Minimal</option>
<option value="kucuk">Küçük</option>
<option value="orta">Orta</option>
<option value="buyuk">Büyük</option>
</select>

<br>

<select id="style">
<option value="">Stil Seç</option>
<option value="yazi">Yazı</option>
</select>

<br><br>

<button onclick="calcPrice()" class="btn">Fiyat Hesapla</button>

<h3 id="result"></h3>
</section>

<section class="section">
<h2>Örnek Dövmelerimiz</h2>

<div class="gallery">
<img src="1.jpg" onclick="openFull(this.src)">
<img src="2.jpg" onclick="openFull(this.src)">
<img src="3.jpg" onclick="openFull(this.src)">
<img src="4.jpg" onclick="openFull(this.src)">
<img src="5.jpg" onclick="openFull(this.src)">
<img src="6.jpg" onclick="openFull(this.src)">
<img src="7.jpg" onclick="openFull(this.src)">
<img src="8.jpg" onclick="openFull(this.src)">
<img src="9.jpg" onclick="openFull(this.src)">
<img src="10.jpg" onclick="openFull(this.src)">
<img src="11.jpg" onclick="openFull(this.src)">
<img src="12.jpg" onclick="openFull(this.src)">
</div>
</section>

<div class="fullscreen" id="full" onclick="closeFull()">
<img id="fullImg">
</div>

<script>
function openFull(src){
document.getElementById("full").style.display="flex";
document.getElementById("fullImg").src=src;
}

function closeFull(){
document.getElementById("full").style.display="none";
}

function calcPrice(){
let size=document.getElementById("size").value;
let style=document.getElementById("style").value;

let min=0,max=0;

if(size==="minimal"){
min=900; max=1000;
}

if(style==="yazi"){
if(size==="kucuk"){min=900; max=1500;}
if(size==="orta"){min=1500; max=2500;}
if(size==="buyuk"){min=2500; max=5000;}
}

if(size==="kucuk" && style!=="yazi"){
min=2000; max=2500;
}
if(size==="orta" && style!=="yazi"){
min=2500; max=4000;
}
if(size==="buyuk" && style!=="yazi"){
min=10000; max=15000;
}

document.getElementById("result").innerHTML="Yaklaşık Fiyat: "+min+" - "+max+" ₺";
}
</script>

</body>
</html>
