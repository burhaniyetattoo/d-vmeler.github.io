<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Burhaniye Tattoo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
color:white;
text-align:center;

/* 🔥 SABİT ARKA PLAN */
background:url('https://images.unsplash.com/photo-1542728928-1413d1894ed1') no-repeat center center fixed;
background-size:cover;
}

/* KARARTMA EFEKTİ */
body::before{
content:"";
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

/* LOGO */
.logo{
font-size:34px;
font-weight:700;
letter-spacing:2px;
margin-bottom:10px;
}

header{
padding:60px 20px;
}

/* BUTON */
.btn{
display:inline-block;
margin:10px;
padding:15px 25px;
border-radius:30px;
background:#e1306c;
color:white;
text-decoration:none;
transition:.3s;
}
.btn:hover{transform:scale(1.05);}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
font-size:22px;
z-index:999;
}

/* FİYAT */
.prices{
display:flex;
justify-content:center;
gap:20px;
padding:20px;
flex-wrap:wrap;
}
.bubble{
width:220px;
padding:25px;
border-radius:25px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(5px);
cursor:pointer;
transition:.3s;
}
.bubble:hover{
transform:scale(1.08);
}

/* GALERİ */
.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
padding:20px;
}
.gallery img{
width:45%;
max-width:250px;
border-radius:15px;
transition:.3s;
}
.gallery img:hover{transform:scale(1.05);}

/* FULLSCREEN */
.fullscreen{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:999;
}
.fullscreen img{width:90%;max-width:500px;}

/* SECTION */
.section{
padding:30px 20px;
background:rgba(0,0,0,0.6);
margin:20px;
border-radius:20px;
}

/* FOOTER */
footer{
padding:30px;
color:#aaa;
}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo-img">
<p>Profesyonel & Hijyenik Dövme</p>

<a href="https://wa.me/905XXXXXXXXX" class="btn">WhatsApp</a>
<a href="https://www.instagram.com/burhaniye_tattoo/" class="btn">Instagram</a>
</header>

<!-- FİYAT -->
<section class="prices">
<div class="bubble">Minimal Dövme<br><b>1000 ₺</b></div>
</section>

<!-- GALERİ -->
<section class="section">
<h2>Çalışmalar</h2>

<div class="gallery">
<img src="1.jpg" onclick="openFull(this.src)">
<img src="2.jpg" onclick="openFull(this.src)">
<img src="3.jpg" onclick="openFull(this.src)">
<img src="4.jpg" onclick="openFull(this.src)">
<img src="5.jpg" onclick="openFull(this.src)">
<img src="6.jpg" onclick="openFull(this.src)">
<img src="7.jpg" onclick="openFull(this.src)">
<img src="8.jpg" onclick="openFull(this.src)">
<img src="9.jpg" onclick="openFull(this.src)">
</div>
</section>

<!-- HAKKIMIZDA -->
<section class="section">
<h2>Hakkımızda</h2>
<p>
Burhaniye Tattoo olarak hijyenik ortamda,
kişiye özel dövme tasarımları yapıyoruz.
</p>
</section>

<!-- KONUM -->
<section class="section">
<h2>Konum</h2>

<iframe 
src="https://www.google.com/maps?q=Burhaniye&output=embed"
width="90%" height="250" style="border-radius:20px;">
</iframe>

</section>

<!-- FULLSCREEN -->
<div class="fullscreen" id="full" onclick="closeFull()">
<img id="fullImg">
</div>

<!-- WHATSAPP FLOAT -->
<a href="https://wa.me/905XXXXXXXXX" class="whatsapp">💬</a>

<footer>
© 2026 Burhaniye Tattoo
</footer>

<script>
function openFull(src){
document.getElementById("full").style.display="flex";
document.getElementById("fullImg").src=src;
}
function closeFull(){
document.getElementById("full").style.display="none";
}
</script>

</body>
</html>
