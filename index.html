<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Burhaniye Tattoo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<meta name="theme-color" content="#001a00">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
color:white;
text-align:center;

/* 🔥 GERÇEK DÖVME ARKA PLAN */
background:url('https://images.unsplash.com/photo-1598373182133-52452f7691ef') no-repeat center center fixed;
background-size:cover;
}

body::before{
content:"";
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,25,0,0.85);
z-index:-1;
}

/* HEADER */
header{padding:60px 20px;}

.logo-img{
width:180px;
filter: drop-shadow(0 0 10px #00ff88)
        drop-shadow(0 0 25px #ffffff);
}

.btn{
display:inline-block;
margin:10px;
padding:14px 22px;
border-radius:30px;
background:#00cc66;
color:white;
text-decoration:none;
box-shadow:0 0 10px #00ff88;
transition:.3s;
}

.btn:hover{
box-shadow:0 0 20px #00ff88,0 0 30px #ffffff;
}

/* SECTION */
.section{
padding:25px;
background:rgba(0,20,0,0.6);
margin:15px;
border-radius:20px;
box-shadow:0 0 15px rgba(0,255,120,0.2);
}

/* SELECT */
select{
padding:12px;
border-radius:10px;
background:#001a00;
color:white;
border:1px solid #00ff88;
margin:5px;
box-shadow:0 0 10px #00ff88 inset;
}

/* RESULT */
#result{
margin-top:20px;
font-size:20px;
color:#00ff88;
text-shadow:0 0 10px #00ff88,0 0 20px #ffffff;
}

/* GALERİ */
.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

.gallery img{
width:45%;
border-radius:15px;
cursor:pointer;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.05);
box-shadow:0 0 15px #00ff88;
}

/* FULLSCREEN */
.fullscreen{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
}

.fullscreen img{
width:90%;
}

/* FOOTER */
footer{
padding:20px;
color:#aaa;
font-size:12px;
}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo-img">
<p>Profesyonel & Hijyenik Dövme</p>
<a href="https://www.instagram.com/burhaniye_tattoo/" class="btn">Rezervasyon</a>
</header>

<section class="section">
<h2>Fiyat Hesapla</h2>

<select id="size">
<option value="">Boyut Seç</option>
<option value="minimal">Minimal</option>
<option value="kucuk">Küçük</option>
<option value="orta">Orta</option>
<option value="buyuk">Büyük</option>
</select>

<br>

<select id="style">
<option value="">Stil Seç</option>
<option value="yazi">Yazı</option>
<option value="normal">Normal</option>
<option value="detayli">Detaylı</option>
<option value="golgeli">Gölgeli</option>
</select>

<br><br>

<button onclick="calcPrice()" class="btn">Fiyat Hesapla</button>

<h3 id="result"></h3>
</section>

<section class="section">
<h2>Örnek Dövmelerimiz</h2>

<div class="gallery">
<img src="1.jpg" onclick="openFull(this.src)">
<img src="2.jpg" onclick="openFull(this.src)">
<img src="3.jpg" onclick="openFull(this.src)">
<img src="4.jpg" onclick="openFull(this.src)">
<img src="5.jpg" onclick="openFull(this.src)">
<img src="6.jpg" onclick="openFull(this.src)">
<img src="7.jpg" onclick="openFull(this.src)">
<img src="8.jpg" onclick="openFull(this.src)">
<img src="9.jpg" onclick="openFull(this.src)">
<img src="10.jpg" onclick="openFull(this.src)">
<img src="11.jpg" onclick="openFull(this.src)">
<img src="12.jpg" onclick="openFull(this.src)">
</div>
</section>

<div class="fullscreen" id="full" onclick="closeFull()">
<img id="fullImg">
</div>

<footer>
© 2026 Burhaniye Tattoo
</footer>

<script>

function openFull(src){
document.getElementById("full").style.display="flex";
document.getElementById("fullImg").src=src;
}

function closeFull(){
document.getElementById("full").style.display="none";
}

function calcPrice(){
let size=document.getElementById("size").value;
let style=document.getElementById("style").value;

let min=0,max=0;

// BASE FİYAT

if(size==="minimal"){
min=900; max=1000;
}

if(style==="yazi"){
if(size==="kucuk"){min=900; max=1500;}
if(size==="orta"){min=1500; max=2500;}
if(size==="buyuk"){min=2500; max=5000;}
}

if(size==="kucuk" && style!=="yazi"){
min=2000; max=2500;
}
if(size==="orta" && style!=="yazi"){
min=2500; max=4000;
}
if(size==="buyuk" && style!=="yazi"){
min=10000; max=15000;
}

// STİL EFEKT

if(style==="detayli"){
min=Math.round(min*1.2);
max=Math.round(max*1.3);
}

if(style==="golgeli"){
min=Math.round(min*1.4);
max=Math.round(max*1.4);
}

document.getElementById("result").innerHTML="Yaklaşık Fiyat: "+min+" - "+max+" ₺";
}

</script>

</body>
</html>
