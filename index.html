<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burhaniye Tattoo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#0a0a0a;color:white;text-align:center;}

header{padding:60px 20px;}
header h1{font-size:36px;}

/* PRICE */
.prices{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.bubble{
width:220px;
padding:25px;
border-radius:30px;
background:#1a1a1a;
cursor:pointer;
transition:.3s;
}

.bubble:hover{transform:scale(1.1);}

/* GALLERY */
.gallery{
display:none;
flex-wrap:wrap;
justify-content:center;
gap:15px;
padding:20px;
}

.gallery a{
display:block;
width:45%;
max-width:250px;
}

.gallery img{
width:100%;
border-radius:15px;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* BUTTON */
.btn{
display:inline-block;
margin:30px;
padding:15px 30px;
border-radius:30px;
background:#e1306c;
color:white;
text-decoration:none;
}

.back{
margin:20px;
cursor:pointer;
color:#aaa;
}
</style>
</head>

<body>

<header>
<h1>Burhaniye Tattoo</h1>
</header>

<section class="prices">
<div class="bubble" onclick="showGallery()">Çalışmalarım<br><b>Tıkla</b></div>
</section>

<div class="back" onclick="goBack()" id="backBtn" style="display:none;">← Geri</div>

<!-- GALERİ -->
<div class="gallery" id="gallery">

<script>
function showGallery(){
document.querySelector(".prices").style.display="none";
document.getElementById("gallery").style.display="flex";
document.getElementById("backBtn").style.display="block";
}

function goBack(){
document.querySelector(".prices").style.display="flex";
document.getElementById("gallery").style.display="none";
document.getElementById("backBtn").style.display="none";
}
</script>
